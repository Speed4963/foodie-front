name: react deploy   

on:
  push:
    branches: [ main ]   

jobs:
  deploy:
    runs-on: ubuntu-latest   

    steps:
      - uses: actions/checkout@v4

      # 1. Node.js 버전을 20으로 명시적으로 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: React build
        run: |
          cd frontend
          npm install
          
      
          chmod -R +x node_modules/.bin
          
          npm run build

      - name: SSH key 생성
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > was.pem   
          chmod 600 was.pem 

      - name: build 전송
        run: |
          scp -o StrictHostKeyChecking=no -i was.pem -r frontend/dist/* \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/html/